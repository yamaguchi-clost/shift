<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>福岡ホテル清掃 シフト管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { max-width: 400px; width: 100%; }
    h1 { color: white; text-align: center; font-size: 22px; margin-bottom: 24px; }
    .subtitle { color: rgba(255,255,255,0.8); text-align: center; font-size: 14px; margin-bottom: 32px; }
    a.card {
      display: block; background: white; border-radius: 16px; padding: 24px; margin-bottom: 16px;
      text-decoration: none; color: #374151; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    a.card:active { transform: scale(0.97); }
    .card-icon { font-size: 36px; margin-bottom: 8px; }
    .card-title { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
    .card-desc { font-size: 13px; color: #6b7280; }
    .footer { text-align: center; color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏨 福岡ホテル清掃<br>シフト管理</h1>
    <p class="subtitle">下のボタンからお進みください</p>
    <a class="card" href="form.html">
      <div class="card-icon">📝</div>
      <div class="card-title">出勤希望を提出する</div>
      <div class="card-desc">出勤できる日をフォームから送信します</div>
    </a>
    <a class="card" href="schedule.html">
      <div class="card-icon">📅</div>
      <div class="card-title">確定シフトを確認する</div>
      <div class="card-desc">自分のシフト・ホテル割り当てを確認します</div>
    </a>
    <p class="footer">お問い合わせは管理者までご連絡ください</p>
  </div>
</body>
</html>
